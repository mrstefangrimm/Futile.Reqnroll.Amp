kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: s2i-webcalculatorapi
  namespace: mydemo
spec:
  output:
    to:
      kind: ImageStreamTag
      name: 's2i-webcalculatorapi:latest'
  successfulBuildsHistoryLimit: 5
  failedBuildsHistoryLimit: 5
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  source:
    type: Git
    git:
      uri: 'https://github.com/mrstefangrimm/Futile.Reqnroll.Amp'
      ref: prerelease/0.0.2
    contextDir: tests/WebCalculatorApi
  runPolicy: Serial
